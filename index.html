<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市屋頂奔跑 - 決戰邪惡之眼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1e1b4b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #target-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid #a855f7;
            padding: 15px;
            border-radius: 12px;
            color: white;
            text-align: right;
            pointer-events: none;
            min-width: 240px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 50;
        }
        #flash-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            transition: opacity 0.3s;
            opacity: 0;
            z-index: 100;
        }
        #level-announcement {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fbbf24;
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 0 0 20px #a855f7;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 200;
        }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>
    <div id="level-announcement">STAGE 2</div>

    <div id="target-ui">
        <div id="level-display" class="text-xs font-bold text-purple-400 mb-1">STAGE 1: ROOFTOP RUN</div>
        <div class="mb-2 flex justify-end">
            <span id="lives-display" class="text-xl tracking-widest text-red-400">❤❤❤❤❤</span>
        </div>
        <div id="shield-status" class="text-xs text-blue-300 font-bold mb-1 opacity-0 transition-opacity">🛡️ 防護罩已啟動</div>
        <p id="instruction-text" class="text-xs opacity-70">尋找這個單字：</p>
        <p id="target-word-zh" class="text-2xl font-bold text-yellow-300">---</p>
        <div class="mt-2 pt-2 border-t border-purple-500/30">
            <p class="text-xs opacity-80">挑戰進度: <span id="progress-display">0/7</span></p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const livesEl = document.getElementById('lives-display');
        const targetZhEl = document.getElementById('target-word-zh');
        const progressEl = document.getElementById('progress-display');
        const shieldStatusEl = document.getElementById('shield-status');
        const levelDisplayEl = document.getElementById('level-display');
        const flashOverlay = document.getElementById('flash-overlay');
        const announcementEl = document.getElementById('level-announcement');

        const vocabulary = [
            { en: "adventurous", zh: "敢於冒險的" },
            { en: "ambitious", zh: "有野心的" },
            { en: "careful", zh: "小心的" },
            { en: "curious", zh: "好奇的" },
            { en: "easygoing", zh: "隨和的" },
            { en: "optimistic", zh: "樂觀的" },
            { en: "outgoing", zh: "外向的" },
            { en: "stubborn", zh: "固執的" },
            { en: "extremely", zh: "極度地" },
            { en: "personality", zh: "人格" }
        ];

        const sprites = {};
        const spriteFiles = { p1: 'person1.png', p2: 'person2.png', p3: 'person3.png', p4: 'person4.png', p5: 'person5.png' };
        Object.entries(spriteFiles).forEach(([key, src]) => {
            const img = new Image(); img.src = src;
            img.onload = () => sprites[key] = { img, loaded: true };
            img.onerror = () => sprites[key] = { img: null, loaded: false };
        });

        const mummySprites = {
            left: { img: new Image(), src: 'mummy.png', loaded: false },
            right: { img: new Image(), src: 'mummy1.png', loaded: false }
        };
        mummySprites.left.img.src = mummySprites.left.src;
        mummySprites.left.img.onload = () => mummySprites.left.loaded = true;
        mummySprites.right.img.src = mummySprites.right.src;
        mummySprites.right.img.onload = () => mummySprites.right.loaded = true;

        const keys = {};

        const evilEye = {
            state: 'closed', timer: 0, eyeX: 100, eyeY: 80, beamX: 0, beamWidth: 120,
            duration: { closed: 240, warning: 70, open: 130 },
            stunnedUntil: 0,
            hasHitPlayer: false, 
            isBurning: false,
            burnStartTime: 0,
            particles: [], // 用於存放燃燒粒子
            get isStunned() { return Date.now() < this.stunnedUntil; }
        };

        let gameState = {
            level: 1,
            scrollX: 0,
            buildings: [],
            bars: [], 
            projectiles: [], 
            mummies: [], 
            floatingWords: [], 
            shieldItems: [], 
            lives: 5, 
            currentVocab: null,
            answeredWords: new Set(),
            gravity: 0.8,
            isGameOver: false,
            isVictory: false,
            lastBuildingX: 0,
            lastFireTime: 0, 
            fireCooldown: 200,
            invincibleTimer: 0,
            lastWordSpawnX: 0,
            lastWordSpawnTime: 0,
            wordsSpawnedCount: 0,
            lastDir: 1,
            level2Score: 0
        };

        const player = {
            worldX: 100, y: 0, width: 50, height: 70, baseHeight: 70, vx: 0, vy: 0, speed: 6.5, jumpPower: -18, onGround: false,
            hasShield: false, isCrouching: false
        };

        class Projectile {
            constructor(x, y, vx, vy) {
                this.worldX = x; this.y = y; this.radius = 8; 
                this.vx = vx; this.vy = vy; 
                this.active = true;
                this.history = []; 
                this.pulse = 0; 
            }
            update() {
                this.history.unshift({x: this.worldX, y: this.y});
                if (this.history.length > 12) this.history.pop();
                
                this.worldX += this.vx;
                this.y += this.vy;
                this.pulse += 0.2;

                for (let b of gameState.buildings) {
                    if (this.worldX > b.x && this.worldX < b.x + b.width && this.y > b.y) { this.active = false; return; }
                }
                for (let m of gameState.mummies) {
                    if (m.active && this.worldX > m.worldX && this.worldX < m.worldX + m.width && this.y > m.y - m.height && this.y < m.y) {
                        m.active = false; this.active = false; return;
                    }
                }
                
                for (let fw of gameState.floatingWords) {
                    if (fw.active) {
                        const b = fw.getBounds();
                        if (this.worldX > b.left && this.worldX < b.right && this.y > b.top && this.y < b.bottom) {
                            fw.active = false; this.active = false; return;
                        }
                    }
                }

                if (gameState.level === 2 && !evilEye.isStunned && !evilEye.isBurning) {
                    const bossHitbox = { x: evilEye.eyeX - 50, y: evilEye.eyeY - 30, w: 100, h: 60 };
                    const screenPosX = this.worldX - gameState.scrollX;
                    if (screenPosX > bossHitbox.x && screenPosX < bossHitbox.x + bossHitbox.w &&
                        this.y > bossHitbox.y && this.y < bossHitbox.y + bossHitbox.h) {
                        evilEye.stunnedUntil = Date.now() + 4000; 
                        evilEye.state = 'closed'; 
                        this.active = false;
                        flashScreen('rgba(168, 85, 247, 0.3)');
                    }
                }

                if (Math.abs(this.worldX - (player.worldX)) > canvas.width + 500 || this.y < -100 || this.y > canvas.height + 100) {
                    this.active = false;
                }
            }
            draw(scrollX) {
                const screenX = this.worldX - scrollX;
                this.history.forEach((pos, i) => {
                    const alpha = (1 - (i / this.history.length)) * 0.5;
                    const size = this.radius * (1 - i / this.history.length);
                    ctx.beginPath();
                    ctx.arc(pos.x - scrollX, pos.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(251, 146, 60, ${alpha})`;
                    ctx.fill();
                });
                ctx.save();
                const glowSize = 15 + Math.sin(this.pulse) * 5;
                ctx.shadowBlur = glowSize;
                ctx.shadowColor = '#f97316';
                const gradient = ctx.createRadialGradient(screenX, this.y, 0, screenX, this.y, this.radius);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, '#fef08a');
                gradient.addColorStop(1, '#ea580c');
                ctx.beginPath();
                ctx.arc(screenX, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(screenX, this.y, this.radius + 2, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 + Math.sin(this.pulse) * 0.2})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();
            }
        }

        class FloatingWord {
            constructor(x, y, vocabObj, speedX = 0, speedY = 0) {
                this.worldX = x; this.y = y; this.en = vocabObj.en; this.zh = vocabObj.zh;
                this.active = true;
                this.floatOffset = Math.random() * Math.PI * 2;
                this.vx = speedX; this.vy = speedY;
                this.width = 0;
            }
            update() {
                this.worldX += this.vx;
                this.y += this.vy;
                this.currentFloatY = this.y + Math.sin(Date.now() / 400 + this.floatOffset) * 10;

                if (gameState.level === 2) {
                    if (this.worldX < -200 || this.worldX > canvas.width + 200 || this.y < -100 || this.y > canvas.height + 100) {
                        this.active = false;
                    }
                }
            }
            draw(scrollX) {
                if (!this.active) return;
                const screenX = this.worldX - scrollX;
                if (screenX < -500 || screenX > canvas.width + 500) return; 
                ctx.font = 'bold 20px Arial';
                const textWidth = ctx.measureText(this.en).width;
                this.width = textWidth + 24;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.beginPath(); ctx.roundRect(screenX - 12, this.currentFloatY - 28, this.width, 35, 8); ctx.fill();
                ctx.strokeStyle = (gameState.level === 2) ? '#ef4444' : '#a855f7';
                ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#1e1b4b'; ctx.textAlign = 'left';
                ctx.fillText(this.en, screenX, this.currentFloatY - 3);
            }
            getBounds() {
                return { left: this.worldX - 12, top: this.currentFloatY - 28, right: this.worldX - 12 + (this.width || 100), bottom: this.currentFloatY - 28 + 35 };
            }
        }

        class Mummy {
            constructor(startX, endX, y) {
                this.rooftopStartX = startX; this.rooftopEndX = endX;
                this.width = 80; this.height = 120;
                this.worldX = startX + Math.random() * (endX - startX - this.width);
                this.y = y; this.speed = 2.0; this.direction = Math.random() > 0.5 ? 1 : -1;
                this.active = true;
            }
            update() {
                if (!this.active) return;
                this.worldX += this.speed * this.direction;
                if (this.worldX + this.width > this.rooftopEndX) { this.direction = -1; this.worldX = this.rooftopEndX - this.width; }
                else if (this.worldX < this.rooftopStartX) { this.direction = 1; this.worldX = this.rooftopStartX; }
            }
            draw(scrollX) {
                if (!this.active) return;
                const screenX = this.worldX - scrollX;
                const sprite = this.direction === 1 ? mummySprites.right : mummySprites.left;
                if (sprite.loaded) ctx.drawImage(sprite.img, screenX, this.y - this.height, this.width, this.height);
                else { ctx.fillStyle = '#7e22ce'; ctx.fillRect(screenX, this.y - this.height, this.width, this.height); }
            }
        }

        class Bar {
            constructor(x, y, width) { this.x = x; this.y = y; this.width = width; }
            draw(scrollX) {
                const drawX = this.x - scrollX;
                ctx.fillStyle = '#64748b'; ctx.fillRect(drawX, this.y, this.width, 10);
                ctx.fillStyle = '#cbd5e1'; ctx.fillRect(drawX, this.y, this.width, 3);
            }
        }

        class ShieldItem {
            constructor(x, y) { this.worldX = x; this.y = y; this.width = 40; this.height = 40; this.active = true; this.pulse = 0; }
            draw(scrollX) {
                if (!this.active) return;
                const screenX = this.worldX - scrollX;
                this.pulse += 0.05;
                const glow = 5 + Math.sin(this.pulse) * 5;
                ctx.save(); ctx.translate(screenX + 20, this.y + 20);
                ctx.shadowBlur = glow + 10; ctx.shadowColor = "#3b82f6";
                ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(15, -10); ctx.lineTo(12, 10); ctx.quadraticCurveTo(0, 20, -12, 10); ctx.lineTo(-15, -10); ctx.closePath();
                ctx.fillStyle = "#60a5fa"; ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-5, 2); ctx.lineTo(1, 2); ctx.lineTo(-3, 12); ctx.lineTo(5, 0); ctx.lineTo(-1, 0); ctx.lineTo(3, -10); ctx.closePath();
                ctx.fillStyle = "white"; ctx.fill();
                ctx.restore();
            }
        }

        class Building {
            constructor(x) {
                this.width = 300 + Math.random() * 300; this.height = 150 + Math.random() * (canvas.height * 0.6);
                this.x = x; this.y = canvas.height - this.height; this.color = '#334155';
                this.windows = [];
                for (let r = 1; r < Math.floor(this.height / 50) - 1; r++) {
                    for (let c = 1; c < Math.floor(this.width / 50) - 1; c++) {
                        if (Math.random() > 0.4) this.windows.push({ x: c * 50, y: r * 50, lit: Math.random() > 0.5 });
                    }
                }
            }
            draw(scrollX) {
                const drawX = this.x - scrollX;
                ctx.fillStyle = this.color; ctx.fillRect(drawX, this.y, this.width, this.height);
                this.windows.forEach(w => { ctx.fillStyle = w.lit ? '#fbbf24' : '#1e293b'; ctx.fillRect(drawX + w.x, this.y + w.y, 16, 22); });
                ctx.fillStyle = '#475569'; ctx.fillRect(drawX, this.y, this.width, 12);
                ctx.fillStyle = '#94a3b8'; ctx.fillRect(drawX, this.y, this.width, 2);
            }
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function addSupportBars(prevObj, currObj) {
            const prevRight = prevObj.x + (prevObj.width || 0);
            const gapX = currObj.x - prevRight;
            const gapY = prevObj.y - currObj.y; 
            const maxJumpX = 220; 
            const maxJumpY = 140; 
            if (gapX > maxJumpX || Math.abs(gapY) > maxJumpY) {
                const steps = Math.max(Math.ceil(gapX / maxJumpX), Math.ceil(Math.abs(gapY) / maxJumpY));
                for (let i = 1; i < steps; i++) {
                    const progress = i / steps;
                    const barX = prevRight + (gapX * progress) - 60;
                    const barY = prevObj.y - (gapY * progress);
                    gameState.bars.push(new Bar(barX, barY, 120));
                }
            }
        }

        function initBuildings() {
            gameState.level = 1; gameState.scrollX = 0;
            gameState.buildings = []; gameState.bars = []; gameState.mummies = []; gameState.floatingWords = []; gameState.shieldItems = [];
            gameState.answeredWords.clear();
            gameState.lastWordSpawnX = 100; 
            gameState.wordsSpawnedCount = 0; 
            let currentX = 0;
            updateTargetVocab(); 
            for (let i = 0; i < 15; i++) {
                const b = new Building(currentX); 
                if (i > 0) {
                    const prevB = gameState.buildings[i-1];
                    addSupportBars(prevB, b);
                    if (Math.random() > 0.4 && b.width > 180) gameState.mummies.push(new Mummy(b.x, b.x + b.width, b.y));
                    if (i % 3 === 0) gameState.shieldItems.push(new ShieldItem(b.x + b.width/2, b.y - 80));
                }
                gameState.buildings.push(b);
                currentX += b.width + (100 + Math.random() * 200); 
            }
            gameState.lastBuildingX = currentX;
            player.worldX = 100; player.y = gameState.buildings[0].y - player.height;
        }

        function initBossLevel() {
            gameState.level = 2; gameState.level2Score = 0;
            gameState.answeredWords.clear();
            gameState.buildings = []; gameState.mummies = []; gameState.shieldItems = []; gameState.floatingWords = [];
            gameState.scrollX = 0;
            player.worldX = canvas.width / 2 - 25; player.y = canvas.height - 150;
            
            gameState.lives = 5;
            updateLives();

            gameState.bars = [
                new Bar(0, canvas.height - 40, canvas.width), 
                new Bar(canvas.width * 0.1, canvas.height * 0.83, 250), 
                new Bar(canvas.width * 0.65, canvas.height * 0.83, 250),
                new Bar(canvas.width * 0.35, canvas.height * 0.70, 300), 
                new Bar(canvas.width * 0.1, canvas.height * 0.57, 250),  
                new Bar(canvas.width * 0.65, canvas.height * 0.57, 250),
                new Bar(canvas.width * 0.35, canvas.height * 0.44, 300), 
                new Bar(canvas.width * 0.15, canvas.height * 0.31, 200), 
                new Bar(canvas.width * 0.6, canvas.height * 0.31, 200),
                new Bar(canvas.width * 0.4, canvas.height * 0.18, 220)  
            ];
            
            levelDisplayEl.textContent = "STAGE 2: EYE OF DOOM";
            announcementEl.style.opacity = "1";
            setTimeout(() => announcementEl.style.opacity = "0", 2000);
            updateTargetVocab();
        }

        function spawnStage1Word(x) {
            if (!gameState.currentVocab) return;
            gameState.wordsSpawnedCount++;
            let targetWord;
            if (gameState.wordsSpawnedCount % 5 === 0) {
                targetWord = gameState.currentVocab;
            } else {
                const others = vocabulary.filter(v => v.en !== gameState.currentVocab.en);
                targetWord = others[Math.floor(Math.random() * others.length)];
            }
            const ground = [...gameState.buildings, ...gameState.bars].find(obj => x >= obj.x && x <= obj.x + obj.width);
            const baseLine = ground ? ground.y : canvas.height - 100;
            const safeY = Math.min(Math.max(200, baseLine - 120 - Math.random() * 80), 500);
            gameState.floatingWords.push(new FloatingWord(x, safeY, targetWord));
        }

        function spawnBossWords() {
            if (gameState.floatingWords.length > 0 || evilEye.isBurning) return;
            
            const correct = gameState.currentVocab;
            if (!correct) return;
            
            const pool = [correct, correct];
            const others = vocabulary.filter(v => v.en !== correct.en).sort(() => 0.5 - Math.random());
            pool.push(others[0]);
            pool.sort(() => 0.5 - Math.random());

            for(let i = 0; i < 3; i++) {
                const side = Math.random() > 0.5 ? -100 : canvas.width + 100;
                const speedX = side < 0 ? (2.0 + Math.random() * 2) : -(2.0 + Math.random() * 2);
                const safeY = 150 + Math.random() * 420;
                gameState.floatingWords.push(new FloatingWord(side, safeY, pool[i], speedX, (Math.random()-0.5)*1.2));
            }
            gameState.lastWordSpawnTime = Date.now();
        }

        function updateTargetVocab() {
            if (gameState.level === 1) {
                if (gameState.answeredWords.size >= 7) { initBossLevel(); return; }
                const pending = vocabulary.filter(v => !gameState.answeredWords.has(v.en));
                gameState.currentVocab = pending[Math.floor(Math.random() * pending.length)];
                progressEl.textContent = `${gameState.answeredWords.size}/7`;
            } else {
                gameState.currentVocab = vocabulary[Math.floor(Math.random() * vocabulary.length)];
                progressEl.textContent = `${gameState.level2Score}/10`;
                
                if (gameState.level2Score >= 10 && !evilEye.isBurning) {
                    evilEye.isBurning = true;
                    evilEye.burnStartTime = Date.now();
                    gameState.floatingWords = []; 
                }
            }
            targetZhEl.textContent = gameState.currentVocab.zh;
        }

        function handleCorrectAnswer() {
            if (evilEye.isBurning) return;
            flashScreen('rgba(34, 197, 94, 0.4)');
            if (gameState.level === 1) gameState.answeredWords.add(gameState.currentVocab.en);
            else gameState.level2Score++;
            updateTargetVocab();
        }

        function updateLives() {
            livesEl.textContent = "❤".repeat(Math.max(0, gameState.lives));
            shieldStatusEl.style.opacity = player.hasShield ? "1" : "0";
            if (gameState.lives <= 0) gameState.isGameOver = true;
        }

        function takeDamage() {
            if (gameState.invincibleTimer > 0 || gameState.isVictory || evilEye.isBurning) return;
            if (player.hasShield) { player.hasShield = false; gameState.invincibleTimer = 100; }
            else { gameState.lives--; gameState.invincibleTimer = 90; }
            flashScreen('rgba(239, 68, 68, 0.4)');
            updateLives();
        }

        function flashScreen(color) {
            flashOverlay.style.backgroundColor = color; flashOverlay.style.opacity = "1";
            setTimeout(() => flashOverlay.style.opacity = "0", 300);
        }

        function update() {
            if (gameState.isGameOver || gameState.isVictory) return;
            if (gameState.invincibleTimer > 0) gameState.invincibleTimer--;

            // 燃燒與逼真特效更新
            if (evilEye.isBurning) {
                // 每幀產生火焰與煙霧粒子
                for (let i = 0; i < 3; i++) {
                    evilEye.particles.push({
                        x: (Math.random() - 0.5) * 80,
                        y: (Math.random() - 0.5) * 40,
                        vx: (Math.random() - 0.5) * 3,
                        vy: -2 - Math.random() * 4,
                        life: 1.0,
                        size: 5 + Math.random() * 15,
                        // 類型: 0 火焰, 1 煙霧
                        type: Math.random() > 0.3 ? 0 : 1
                    });
                }

                if (Date.now() - evilEye.burnStartTime > 3000) {
                    gameState.isVictory = true;
                }
            }

            // 更新粒子狀態
            evilEye.particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.015;
                p.size *= 0.98;
                if (p.life <= 0) evilEye.particles.splice(index, 1);
            });

            if (keys['ArrowDown']) {
                if (!player.isCrouching) {
                    player.height = player.baseHeight / 2;
                    player.y += player.height; 
                    player.isCrouching = true;
                }
            } else {
                if (player.isCrouching) {
                    player.y -= (player.baseHeight / 2);
                    player.height = player.baseHeight;
                    player.isCrouching = false;
                }
            }

            if (evilEye.isStunned || evilEye.isBurning) {
                evilEye.state = 'closed';
            } else {
                evilEye.timer++;
                if (evilEye.state === 'closed' && evilEye.timer > evilEye.duration.closed) {
                    evilEye.state = 'warning'; evilEye.timer = 0;
                    evilEye.hasHitPlayer = false; 
                    evilEye.beamX = (gameState.level === 2) ? player.worldX + 25 : Math.random() * (canvas.width - 200) + 100;
                } else if (evilEye.state === 'warning' && evilEye.timer > evilEye.duration.warning) {
                    evilEye.state = 'open'; evilEye.timer = 0;
                } else if (evilEye.state === 'open' && evilEye.timer > evilEye.duration.open) {
                    evilEye.state = 'closed'; evilEye.timer = 0;
                }
                
                if (evilEye.state === 'open' && !evilEye.hasHitPlayer) {
                    const px = player.worldX - gameState.scrollX + player.width/2;
                    if (Math.abs(px - evilEye.beamX) < evilEye.beamWidth/2) {
                        takeDamage();
                        evilEye.hasHitPlayer = true; 
                    }
                }
            }

            if (keys['ArrowLeft']) { player.vx = -player.speed; gameState.lastDir = -1; }
            else if (keys['ArrowRight']) { player.vx = player.speed; gameState.lastDir = 1; }
            else player.vx = 0;

            player.worldX += player.vx; player.vy += gameState.gravity; player.y += player.vy; player.onGround = false;

            if (gameState.level === 1) {
                if (player.worldX > gameState.lastWordSpawnX + 350) {
                    spawnStage1Word(player.worldX + canvas.width * 0.8);
                    gameState.lastWordSpawnX = player.worldX;
                }
                const targetScrollX = player.worldX - 150;
                gameState.scrollX += (targetScrollX - gameState.scrollX) * 0.1;
            } else if (gameState.level === 2) {
                if (player.worldX < 0) player.worldX = 0;
                if (player.worldX > canvas.width - player.width) player.worldX = canvas.width - player.width;
                spawnBossWords();
            }

            [...gameState.buildings, ...gameState.bars].forEach(obj => {
                if (player.worldX + player.width > obj.x && player.worldX < obj.x + obj.width) {
                    if (player.vy >= 0 && player.y + player.height > obj.y && player.y + player.height < obj.y + player.vy + 12) {
                        player.y = obj.y - player.height; player.vy = 0; player.onGround = true;
                    }
                }
            });

            gameState.mummies.forEach(m => { 
                m.update(); 
                if (m.active && player.worldX + player.width > m.worldX && player.worldX < m.worldX + m.width && player.y + player.height > m.y - m.height && player.y < m.y) takeDamage(); 
            });
            
            gameState.shieldItems.forEach(si => { 
                if (si.active && player.worldX + player.width > si.worldX && player.worldX < si.worldX + si.width && player.y + player.height > si.y && player.y < si.y + si.height) { si.active = false; player.hasShield = true; updateLives(); } 
            });

            gameState.floatingWords.forEach(fw => {
                if (!fw.active) return;
                fw.update();
                const b = fw.getBounds();
                if (player.worldX + player.width > b.left && player.worldX < b.right && 
                    player.y + player.height > b.top && player.y < b.bottom) {
                    fw.active = false;
                    if (fw.en === gameState.currentVocab.en) handleCorrectAnswer();
                    else takeDamage();
                }
            });
            gameState.floatingWords = gameState.floatingWords.filter(fw => fw.active);

            if (player.y > canvas.height) { takeDamage(); player.y = 0; player.worldX = Math.max(100, player.worldX - 150); }
            
            if (gameState.level === 1 && gameState.buildings[gameState.buildings.length-1].x - gameState.scrollX < canvas.width + 500) {
                const prevB = gameState.buildings[gameState.buildings.length-1];
                const b = new Building(gameState.lastBuildingX); 
                addSupportBars(prevB, b);
                if (Math.random() > 0.4 && b.width > 180) gameState.mummies.push(new Mummy(b.x, b.x + b.width, b.y));
                gameState.buildings.push(b);
                gameState.lastBuildingX += b.width + (120 + Math.random() * 200);
            }

            gameState.projectiles.forEach(p => p.update());
            gameState.projectiles = gameState.projectiles.filter(p => p.active);
        }

        function draw() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1e1b4b'); grad.addColorStop(1, '#312e81');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawEvilEye();
            gameState.buildings.forEach(b => b.draw(gameState.scrollX));
            gameState.bars.forEach(bar => bar.draw(gameState.scrollX));
            gameState.mummies.forEach(m => m.draw(gameState.scrollX));
            gameState.shieldItems.forEach(si => si.draw(gameState.scrollX));
            gameState.projectiles.forEach(p => p.draw(gameState.scrollX));
            gameState.floatingWords.forEach(fw => fw.draw(gameState.scrollX));
            
            const screenX = player.worldX - gameState.scrollX;
            if (player.hasShield) {
                ctx.beginPath(); ctx.arc(screenX + 25, player.y + player.height/2, 55, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(59, 130, 246, 0.2)'; ctx.fill();
                ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 2; ctx.stroke();
            }

            if (gameState.invincibleTimer % 10 < 5) {
                const spriteKey = getActiveSpriteKey();
                const s = sprites[spriteKey];
                if (s && s.loaded) ctx.drawImage(s.img, screenX, player.y, player.width, player.height);
                else { ctx.fillStyle = '#10b981'; ctx.fillRect(screenX, player.y, player.width, player.height); }
            }

            if (gameState.isGameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white'; ctx.font = 'bold 48px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('遊戲結束', canvas.width/2, canvas.height/2);
                ctx.font = '20px sans-serif';
                ctx.fillText('按 [Enter] 重新挑戰', canvas.width/2, canvas.height/2 + 60);
            }
            if (gameState.isVictory) {
                ctx.fillStyle = 'rgba(168, 85, 247, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white'; ctx.font = 'bold 64px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('🏆 傳奇過關！', canvas.width/2, canvas.height/2);
                ctx.font = '24px sans-serif'; ctx.fillText('你已掌握所有性格單字並擊敗了邪惡之眼', canvas.width/2, canvas.height/2 + 60);
                ctx.fillText('按 [Enter] 重新遊玩', canvas.width/2, canvas.height/2 + 100);
            }
        }

        function getActiveSpriteKey() {
            if (player.isCrouching) return 'p4';
            if (keys['ArrowUp'] && keys['Space']) return 'p5'; 
            if (keys['ArrowLeft']) return 'p2';
            if (keys['ArrowRight']) return 'p1';
            return 'p1';
        }

        function drawEvilEye() {
            if (gameState.isVictory) return;
            if (gameState.level === 2) { evilEye.eyeX = canvas.width / 2; evilEye.eyeY = 100; }
            else { evilEye.eyeX = 100; evilEye.eyeY = 80; }

            const bX = evilEye.beamX;
            if (evilEye.state === 'open' && !evilEye.isStunned && !evilEye.isBurning) {
                const beamGrad = ctx.createLinearGradient(bX - 60, 0, bX + 60, 0);
                beamGrad.addColorStop(0, 'rgba(168, 85, 247, 0)'); beamGrad.addColorStop(0.5, 'rgba(168, 85, 247, 0.7)'); beamGrad.addColorStop(1, 'rgba(168, 85, 247, 0)');
                ctx.fillStyle = beamGrad; ctx.fillRect(bX - 60, 0, 120, canvas.height);
                ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(bX, 0); ctx.lineTo(bX, canvas.height); ctx.stroke();
            } else if (evilEye.state === 'warning' && !evilEye.isStunned && !evilEye.isBurning) {
                ctx.strokeStyle = '#f87171'; ctx.setLineDash([10, 5]); ctx.strokeRect(bX - 50, 0, 100, canvas.height); ctx.setLineDash([]);
            }

            ctx.save();
            
            let offsetX = 0;
            let offsetY = 0;
            if (evilEye.isBurning) {
                offsetX = (Math.random() - 0.5) * 20;
                offsetY = (Math.random() - 0.5) * 20;
            }
            ctx.translate(evilEye.eyeX + offsetX, evilEye.eyeY + offsetY);
            
            // 繪製粒子 (在眼睛下方)
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            evilEye.particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                if (p.type === 0) {
                    // 火焰色彩
                    const r = 255;
                    const g = Math.floor(100 + p.life * 155);
                    const b = Math.floor(p.life * 50);
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${p.life * 0.8})`;
                    ctx.shadowBlur = p.size;
                    ctx.shadowColor = `rgba(255, 100, 0, ${p.life})`;
                } else {
                    // 煙霧色彩
                    ctx.fillStyle = `rgba(60, 60, 60, ${p.life * 0.6})`;
                }
                ctx.fill();
            });
            ctx.restore();

            // 繪製眼睛本體
            ctx.beginPath(); ctx.ellipse(0, 0, 60, 30, 0, 0, Math.PI * 2); 
            if (evilEye.isBurning) {
                // 燃燒時眼睛變紅熱
                const pulse = Math.abs(Math.sin(Date.now()/100));
                ctx.fillStyle = `rgb(${20 + pulse*80}, 0, 0)`;
            } else {
                ctx.fillStyle = '#0f172a';
            }
            ctx.fill();
            
            ctx.strokeStyle = (evilEye.isStunned || evilEye.state === 'closed' || evilEye.isBurning) ? '#64748b' : '#a855f7'; 
            ctx.lineWidth = 3; ctx.stroke();

            if (evilEye.isStunned || evilEye.state === 'closed' || evilEye.isBurning) {
                ctx.beginPath(); ctx.moveTo(-45, 0); ctx.quadraticCurveTo(0, 15, 45, 0); 
                ctx.strokeStyle = evilEye.isBurning ? '#f97316' : '#94a3b8';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.lineWidth = 2;
                for (let i = -30; i <= 30; i += 15) {
                    const lashX = i; const lashY = 8 + (Math.abs(i) === 0 ? 5 : 2);
                    ctx.beginPath(); ctx.moveTo(lashX, lashY - 5); ctx.lineTo(lashX + (i/10), lashY + 5); ctx.stroke();
                }
            } else {
                const irisGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 22);
                irisGrad.addColorStop(0, '#9333ea'); irisGrad.addColorStop(1, '#4c1d95');
                ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fillStyle = irisGrad; ctx.fill();
                ctx.fillStyle = 'black'; ctx.beginPath(); ctx.ellipse(0, 0, 5, 18, 0, 0, Math.PI * 2); ctx.fill();
            }

            ctx.restore();
        }

        function resetGame() {
            gameState.lives = 5;
            gameState.level = 1;
            gameState.isGameOver = false;
            gameState.isVictory = false;
            gameState.level2Score = 0;
            gameState.invincibleTimer = 0;
            gameState.lastWordSpawnX = 100;
            gameState.wordsSpawnedCount = 0;
            evilEye.isBurning = false;
            evilEye.particles = [];
            player.worldX = 100;
            player.vy = 0;
            player.hasShield = false;
            levelDisplayEl.textContent = "STAGE 1: ROOFTOP RUN";
            initBuildings();
            updateLives();
        }

        window.addEventListener('keydown', e => {
            if ((gameState.isGameOver || gameState.isVictory) && e.code === 'Enter') {
                resetGame();
                return;
            }

            keys[e.code] = true;
            if (e.code === 'Space') {
                const now = Date.now();
                if (now - gameState.lastFireTime > gameState.fireCooldown) {
                    const startX = player.worldX + 25;
                    const startY = player.isCrouching ? player.y + 15 : player.y + 35;
                    let vx = 0, vy = 0;
                    if (keys['ArrowUp']) { vy = -17; } 
                    else { vx = 17 * gameState.lastDir; }
                    gameState.projectiles.push(new Projectile(startX, startY, vx, vy));
                    gameState.lastFireTime = now;
                }
            }
            if (e.code === 'ArrowUp' && player.onGround) { player.vy = player.jumpPower; player.onGround = false; }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        window.onload = () => { initBuildings(); updateLives(); gameLoop(); };
    </script>
</body>
